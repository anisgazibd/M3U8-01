<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdn.jsdelivr.net/npm/videojs-video-element/+esm" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/player.style/yt/+esm" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        .player-container {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        
        media-theme-yt {
            width: 100%;
            --media-theme-yt-primary: #ff0000;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <media-theme-yt style="width: 100%;">
            <videojs-video 
                crossorigin="anonymous" 
                playsinline 
                slot="media" 
                src="https://river-1.rutube.ru/stream/genetta-301.m9.rutube.ru/5_GzmCR6Q3_Lao9SQPe7DA/1780246595/7c13a51576b9ff2601f08f5d57dd5169/360p_stream.m3u8"
            ></videojs-video>
        </media-theme-yt>
    </div>

    <script>
        // Adjust player height based on aspect ratio
        function adjustPlayerHeight() {
            const player = document.querySelector('media-theme-yt');
            const width = player.clientWidth;
            // Using 16:9 aspect ratio
            const height = width * (9/16);
            player.style.height = `${height}px`;
        }
        
        // Adjust on load and resize
        window.addEventListener('load', adjustPlayerHeight);
        window.addEventListener('resize', adjustPlayerHeight);
    </script>
</body>
</html>
